# Default values for node-data-broker.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  repository: ghcr.io/nvidia/topograph
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

enabled: true

# Port the node-data-broker serves its /healthz endpoint on after applying
# node annotations.
port: 8080

# Extra key=value parameters passed to node-data-broker-initc via --set
# (e.g. gpu-operator-namespace / device-plugin-daemonset for infiniband-k8s).
extraArgs: []
#  - key=val

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

verbosity: 3

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Optional ConfigMaps rendered by the chart and mounted into the
# node-data-broker container. Set subPath for file mounts;
# omit it to mount the whole ConfigMap as a directory.
configMapMounts: []
# name is used as a Kubernetes resource and volume suffix; keep it DNS-label-safe.
# - name: ibdiag
#   mountPath: /etc/infiniband-diags/ibdiag.conf
#   subPath: ibdiag.conf
#   data:
#     ibdiag.conf: |-
#       CA=smi0
#       Port=1

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
