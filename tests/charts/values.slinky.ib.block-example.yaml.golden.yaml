# Source: topograph/charts/node-observer/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chart-ci-node-observer
  labels:
    helm.sh/chart: node-observer-0.4.0
    app.kubernetes.io/name: node-observer
    app.kubernetes.io/instance: chart-ci
    app.kubernetes.io/version: "v0.4.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: node-observer
      app.kubernetes.io/instance: chart-ci
  template:
    metadata:
      labels:
        helm.sh/chart: node-observer-0.4.0
        app.kubernetes.io/name: node-observer
        app.kubernetes.io/instance: chart-ci
        app.kubernetes.io/version: "v0.4.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: chart-ci-node-observer
      securityContext:
        {}
      initContainers:
        - name: wait
          image: curlimages/curl:8.13.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
          args:
            - -c
            - |
              until curl -sf "http://chart-ci.topograph.svc.cluster.local:49021/healthz" ; do
                echo "Waiting for topograph to start ..."
                sleep 2
              done
      containers:
        - name: node-observer
          securityContext:
            {}
          image: "ghcr.io/nvidia/topograph:v0.4.0"
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/node-observer
          args:
            - -v=3
          resources:
            limits:
              cpu: 400m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: config-volume
              mountPath: /etc/topograph
      volumes:
        - name: config-volume
          configMap:
            defaultMode: 420
            name: chart-ci-node-observer
      nodeSelector:
        dedicated: user-workload
