# Source: topograph/charts/node-data-broker/templates/daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: chart-ci-node-data-broker
  labels:
    helm.sh/chart: node-data-broker-0.4.0
    app.kubernetes.io/name: node-data-broker
    app.kubernetes.io/instance: chart-ci
    app.kubernetes.io/version: "v0.4.0"
    app.kubernetes.io/managed-by: Helm
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: node-data-broker
      app.kubernetes.io/instance: chart-ci
  template:
    metadata:
      labels:
        helm.sh/chart: node-data-broker-0.4.0
        app.kubernetes.io/name: node-data-broker
        app.kubernetes.io/instance: chart-ci
        app.kubernetes.io/version: "v0.4.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: chart-ci-node-data-broker
      securityContext:
        {}
      initContainers:
        - name: init-node-labels
          image: "ghcr.io/nvidia/topograph:v0.4.0"
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/node-data-broker-initc
          args:
            - --provider=infiniband-k8s
            - -v=4
            - --set=useGpuCliqueLabel=true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - mountPath: /sys/class
              name: sys-class-volume
      containers:
        - name: node-data-broker
          securityContext:
            privileged: true
          image: "ghcr.io/nvidia/topograph/ib:main"
          imagePullPolicy: IfNotPresent
          command:
            
            - tail
            - -f
            - /dev/null
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - mountPath: /sys/class
              name: sys-class-volume
      volumes:
        - hostPath:
            path: /sys/class
            type: Directory
          name: sys-class-volume
      nodeSelector:
        node.dgxc.nvidia.com/has-gpu: "true"
      tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Equal
          value: present
