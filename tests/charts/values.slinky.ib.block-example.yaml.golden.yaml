apiVersion: apps/v1
kind: Deployment
metadata:
  name: chart-ci-topograph
  labels:
    helm.sh/chart: topograph-0.4.0
    app.kubernetes.io/name: topograph
    app.kubernetes.io/instance: chart-ci
    app.kubernetes.io/version: "v0.4.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: topograph
      app.kubernetes.io/instance: chart-ci
  template:
    metadata:
      labels:
        helm.sh/chart: topograph-0.4.0
        app.kubernetes.io/name: topograph
        app.kubernetes.io/instance: chart-ci
        app.kubernetes.io/version: "v0.4.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: chart-ci-topograph
      securityContext:
        {}
      containers:
        - name: topograph
          securityContext:
            {}
          image: "ghcr.io/nvidia/topograph:v0.4.0"
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/topograph
          args:
            - -v=3
          env:
            - name: NODE_DATA_BROKER_NAME
              value: chart-ci-node-data-broker
            - name: NODE_DATA_BROKER_NAMESPACE
              value: topograph
          ports:
            - name: http
              containerPort: 49021
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            limits:
              cpu: 400m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: config-volume
              mountPath: /etc/topograph
      volumes:
        - name: config-volume
          configMap:
            defaultMode: 420
            name: chart-ci-topograph
      nodeSelector:
        dedicated: user-workload
      tolerations:
        - operator: Exists
